<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 200px;
            background-color: #f0f0f0;
            gap: 2px;
            flex-wrap: wrap;
        }
        .item {
            width: 150px;
            height: auto;
            background-color: #4CAF50;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            border-radius: 10px;
            padding: 15px;
            flex-direction: column;
            transition: all 0.3s ease;
        }
        .item:hover{
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(164, 31, 31, 0.2);
        }
        .item h3 {
            margin-bottom: 10px;   
        }
            button {
                padding: 10px 20px;
                font-size: 16px;
                background-color: #008CBA;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                display: block;
                margin: auto;
                transition: all 0.3s ease;
            }
            button:hover {
                background-color: #005f73;
                transform: scale(1.1);
            }
            @media (max-width: 768px) {
                .container{
                    height: auto;
                }
                .item {
                    width: 45%;
                }
            }
@media (max-width: 480px){
    .item{
        width: 100%;
    }   
}

    </style>
</head>
<body>
    <h1>Flexbox Example</h1>
    <div class="container">
        <div class="item">
            <h3>Card 1</h3>
            <p>This is a card with some content.</p>
        </div>
        <div class="item">
            <h3>Card 2</h3>
            <p>This is another card with some content.</p>
        </div>
        <div class="item">
            <h3>Card 3</h3>
            <p>This is yet another card with some content.</p>
        </div>
    </div>
    <button>submit</button>
    
</body>
</html>
